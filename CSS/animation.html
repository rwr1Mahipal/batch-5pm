<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        width: 100%;
        height: 300vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      /* .box {
        width: 100px;
        height: 200px;
        border: 1px solid brown;
        border-radius: 0 20px;
        animation: moveUpDown 5s ease-in infinite;
      } */

      /* @keyframes moveUpDown {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(100px);
        }
        100% {
          transform: translateY(0);
        }
      } */

      .main {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .box {
        width: 300px;
        height: 200px;
        border: 1px solid brown;
        animation: leftMove linear;
        animation-timeline: view();
      }

      @keyframes leftMove {
        0% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(200px);
          transform: rotate(180deg);
          background-color: black;
        }
        100% {
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <!-- <div class="box"></div> -->

    <div class="main">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
