<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .main-div{
            background-color: aqua;
            display: inline-block;
            width: 500px;
            height: 500px;
        }
        h1{
            background-color: blue;
            display: inline;
        }
        span{
            background-color: red;
            display: block;
        }
        h3{
            display: none;
        }
    </style>
</head>
<body>
    <div class="main-div">Hello im div</div>
    <h1>Hello Im H1 </h1>
    <span>Hello im span</span>
    <h3>Hello Im H3</h3>
</body>
</html>
