<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        height: 300vh;
        width: 100vw;
        margin: 0;
        padding: 0;
      }
      nav {
        border: 1px solid brown;
        position: fixed;
        left: 10px;
        right: 10px;
        top: 20px;
        /* bottom: 0px; */
        border-radius: 50px;
        z-index: 1;
        backdrop-filter: blur(2px);
        background-color: rgba(250, 235, 215, 0.425);
      }

      .nav-btn {
        float: right;
      }
      .nav-links,
      .nav-logo {
        display: inline-block;
      }

      .hello-div {
        /* position: -webkit-sticky; */
        position: sticky;
        top: 200px;
        width: 300px;
        height: 300px;
        border: 3px solid blue;
        background-color: white;
        z-index: 10;
      }

      .content-spacer {
        height: 2000px;
        background: linear-gradient(to bottom, #f0f0f0, #ccc);
        padding: 20px;
      }
      .div-img {
        width: 100%;
        height: 80vh;
      }

      .div-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: relative;
      }
      .div-img h1 {
        position: absolute;
        top: 50%;
        left: 50%;
        color: aliceblue;
        font-size: 100px;
      }
    </style>
  </head>
